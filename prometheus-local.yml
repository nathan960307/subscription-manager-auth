global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'auth-server-local'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['http://localhost:8081']

  - job_name: 'business-server-local'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'http://localhost:8080' ]
